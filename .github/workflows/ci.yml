name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Python lint ───────────────────────────────────────────────────────────
  lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Lint
        run: ruff check koet.py koet-server.py

  # ── JSON validation ───────────────────────────────────────────────────────
  json:
    name: JSON validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate JSON files
        run: |
          for f in *.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f"
          done

  # ── Shell script linting ──────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck --severity=warning \
            start.sh \
            packaging/build-pkg.sh \
            packaging/koet-wrapper

  # ── HTML sanity check ─────────────────────────────────────────────────────
  html-check:
    name: HTML sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check HTML markers
        run: |
          python3 - <<'EOF'
          import sys
          with open("koet-ui.html") as f:
              html = f.read()
          checks = {
              "SSE stream connect": "api/stream",
              "confirm API": "api/confirm",
              "results API": "api/results",
              "phase bar": "phase-bar",
              "configure panel": 'id="panel-configure"',
              "results panel": 'id="panel-results"',
          }
          failed = [name for name, marker in checks.items() if marker not in html]
          if failed:
              print(f"FAIL: missing markers: {failed}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: all {len(checks)} markers present")
          size_kb = len(html.encode()) // 1024
          print(f"OK: file size {size_kb} KB")
          EOF

  # ── Flask smoke test ──────────────────────────────────────────────────────
  smoke:
    name: Flask smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: pip install --quiet "flask>=3.0,<4" distro

      - name: Start server and check /api/status
        run: |
          python3 koet-server.py &
          SERVER_PID=$!
          sleep 3
          STATUS=$(curl -sf http://127.0.0.1:5002/api/status)
          echo "status: $STATUS"
          echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['running']==False"
          kill $SERVER_PID

  # ── Build DEB ─────────────────────────────────────────────────────────────
  build-deb:
    name: Build DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install dpkg-dev
        run: sudo apt-get install -y dpkg-dev

      - name: Build DEB package
        run: ./packaging/build-pkg.sh --deb

      - name: Verify DEB
        run: |
          deb=$(ls dist/*.deb | head -1)
          echo "Package: $deb"
          dpkg-deb --info "$deb"
          dpkg-deb --contents "$deb"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: koet-deb
          path: dist/*.deb

  # ── Build RPM ─────────────────────────────────────────────────────────────
  build-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install rpm-build
        run: sudo apt-get install -y rpm

      - name: Build RPM package
        run: ./packaging/build-pkg.sh --rpm

      - name: Verify RPM
        run: |
          rpm=$(ls dist/*.rpm | head -1)
          echo "Package: $rpm"
          rpm -qip "$rpm"
          rpm -qlp "$rpm"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: koet-rpm
          path: dist/*.rpm
