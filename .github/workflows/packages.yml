name: Build packages

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Build both packages on x86_64 ─────────────────────────────────────────
  build:
    name: Build RPM + DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm dpkg-dev rpm-sign

      - name: Build packages
        run: |
          cd packaging
          bash build-pkg.sh

      - name: Sign RPM
        if: env.RPM_GPG_PRIVATE_KEY != ''
        env:
          RPM_GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
          RPM_GPG_KEY_ID: ${{ secrets.RPM_GPG_KEY_ID }}
        run: |
          echo "$RPM_GPG_PRIVATE_KEY" | gpg --batch --import

          cat > ~/.rpmmacros <<EOF
          %_gpg_name $RPM_GPG_KEY_ID
          %_gpg_path $HOME/.gnupg
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor \
            --passphrase-fd 3 --no-secmem-warning -u "%{_gpg_name}" \
            -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          EOF

          rpm --addsign dist/*.rpm

          # Export public key for users to verify packages
          gpg --armor --export "$RPM_GPG_KEY_ID" > dist/koet-rpm-key.asc

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload RPM
        uses: actions/upload-artifact@v4.6.2
        with:
          name: koet-rpm
          path: |
            dist/*.rpm
            dist/*.asc
          if-no-files-found: error

      - name: Upload DEB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: koet-deb
          path: dist/*.deb
          if-no-files-found: error

  # ── Smoke-test: install + start on x86_64 ─────────────────────────────────
  test-x86:
    name: Install smoke test (x86_64)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download DEB
        uses: actions/download-artifact@v4.3.0
        with:
          name: koet-deb
          path: dist/

      - name: Install DEB
        run: |
          sudo apt-get install -y python3-venv python3-pip
          sudo apt-get install -y ./dist/*.deb

      - name: Verify man pages installed
        run: man -w koet-ui && man -w koet

      - name: Smoke test — koet-ui starts and API responds
        run: |
          koet-ui &
          SERVER_PID=$!
          # give venv/Flask time to be ready
          sleep 6

          STATUS=$(curl -sf http://127.0.0.1:5002/api/status)
          echo "status: $STATUS"
          echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['running']==False"

          curl -sf http://127.0.0.1:5002/ | grep -q "KOET"

          kill $SERVER_PID

  # ── Smoke-test: install + start on arm64 ──────────────────────────────────
  test-arm64:
    name: Install smoke test (arm64)
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download DEB
        uses: actions/download-artifact@v4.3.0
        with:
          name: koet-deb
          path: dist/

      - name: Install DEB
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-venv python3-pip
          sudo apt-get install -y ./dist/*.deb

      - name: Verify man pages installed
        run: man -w koet-ui && man -w koet

      - name: Smoke test — koet-ui starts and API responds
        run: |
          koet-ui &
          SERVER_PID=$!
          sleep 6

          STATUS=$(curl -sf http://127.0.0.1:5002/api/status)
          echo "status: $STATUS"
          echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['running']==False"

          curl -sf http://127.0.0.1:5002/ | grep -q "KOET"

          kill $SERVER_PID

  # ── Publish artifacts on tagged release ───────────────────────────────────
  release:
    name: Attach packages to GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-x86, test-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download RPM
        uses: actions/download-artifact@v4.3.0
        with:
          name: koet-rpm
          path: dist/

      - name: Download DEB
        uses: actions/download-artifact@v4.3.0
        with:
          name: koet-deb
          path: dist/

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: dist/*
